name: Build & Release

on:
  push:
    tags:
      - "v*"
      - "can*"
      - "alpha*"
      - "beta*"
  release:
    types:
      - published
      - prereleased

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            archive: tar.gz
            bin_name: pm
            artifact_suffix: linux-amd64
          - os: ubuntu-24.04-arm
            label: linux-arm64
            archive: tar.gz
            bin_name: pm
            artifact_suffix: linux-arm64
          - os: macos-13
            label: darwin-amd64
            archive: tar.gz
            bin_name: pm
            artifact_suffix: darwin-amd64
          - os: macos-14
            label: darwin-arm64
            archive: tar.gz
            bin_name: pm
            artifact_suffix: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag name
        shell: bash
        run: echo "RELEASE_TAG=${{ github.event.release.tag_name || github.ref_name }}" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libasound2-dev libudev-dev

      - name: Build release binary (Unix)
        env:
          BIN_NAME: ${{ matrix.bin_name }}
        run: bash ./scripts/build.sh

      - name: Package release artifact (Unix)
        shell: bash
        run: |
          ARTIFACT_NAME="apm-${RELEASE_TAG}-${{ matrix.artifact_suffix }}"
          mkdir -p release
          cp "dist/${{ matrix.bin_name }}" "release/$ARTIFACT_NAME"
          chmod +x "release/$ARTIFACT_NAME"
          tar -C release -czf "release/$ARTIFACT_NAME.tar.gz" "$ARTIFACT_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: Resolve tag name
        shell: bash
        run: echo "RELEASE_TAG=${{ github.event.release.tag_name || github.ref_name }}" >> "$GITHUB_ENV"

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
