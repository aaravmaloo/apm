name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libasound2-dev libudev-dev

      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Run hybrid test suite (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/test.sh

      - name: Run hybrid test suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\test.ps1

  hybrid-build:
    name: Hybrid build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            bin_name: pm-linux-amd64
          - os: macos-13
            label: darwin-amd64
            bin_name: pm-darwin-amd64
          - os: macos-14
            label: darwin-arm64
            bin_name: pm-darwin-arm64
          - os: windows-latest
            label: windows-amd64
            bin_name: pm-windows-amd64.exe
            cargo_target: x86_64-pc-windows-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libasound2-dev libudev-dev

      - name: Setup MSYS2
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Build hybrid binary (Unix)
        if: runner.os != 'Windows'
        env:
          BIN_NAME: ${{ matrix.bin_name }}
        run: bash ./scripts/build.sh

      - name: Build hybrid binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          BIN_NAME: ${{ matrix.bin_name }}
          CARGO_BUILD_TARGET: ${{ matrix.cargo_target }}
        run: .\scripts\build.ps1
