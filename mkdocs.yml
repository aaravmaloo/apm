site_name: APM Documentation
site_description: Documentation for APM — a professional-grade, zero-knowledge CLI password manager.
site_author: Aarav Maloo
site_url: https://aaravmaloo.github.io/apm/

repo_name: aaravmaloo/apm
repo_url: https://github.com/aaravmaloo/apm

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: white
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.copy
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - First steps: getting-started/first-steps.md
    - Features: getting-started/features.md
    - Getting help: getting-started/help.md
  - Guides:
    - guides/index.md
    - Managing your vault: guides/vault-management.md
    - Cloud synchronization: guides/cloud-sync.md
    - Using .apmignore: guides/apmignore.md
    - Autofill on Windows: autofill_windows.md
    - Face ID: guides/faceid.md
    - Generating TOTP codes: guides/totp.md
    - Managing sessions: guides/sessions.md
    - Using plugins: guides/plugins.md
    - MCP integration: guides/mcp-integration.md
    - Team edition: guides/team-edition.md
    - Importing and exporting: guides/import-export.md
  - Concepts:
    - concepts/index.md
    - Architecture: concepts/architecture.md
    - Encryption: concepts/encryption.md
    - Vault format: concepts/vault-format.md
    - Secret types: concepts/secret-types.md
    - Security profiles: concepts/security-profiles.md
    - Policy engine: concepts/policy-engine.md
    - Sessions: concepts/sessions.md
    - Cloud synchronization: concepts/cloud-sync.md
    - Plugins: concepts/plugins.md
    - MCP server: concepts/mcp.md
    - Recovery: concepts/recovery.md
  - Reference:
    - reference/index.md
    - CLI: reference/cli.md
    - .apmignore: reference/apmignore.md
    - Storage: reference/storage.md
    - Environment variables: reference/environment-variables.md
    - Plugin API: reference/plugin-api.md
    - MCP tools: reference/mcp-tools.md
    - Policies: reference/policies.md
  - Team:
    - team/index.md
    - RBAC and roles: team/rbac.md
    - Departments: team/departments.md
    - Approval workflows: team/approvals.md
