version: 2
project_name: apm

before:
  hooks:
    - go mod tidy

builds:
  - id: apm
    binary: apm
    main: ./main.go
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: apm
    package_name: apm
    formats:
      - deb
    vendor: "APM"
    maintainer: "Aarav Maloo <aaravmaloo06@gmail.com>"
    homepage: "https://aaravmaloo.github.io/apm/"
    description: "Advanced Package Manager."
    license: "MIT"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'