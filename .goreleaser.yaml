version: 2
project_name: apm
release:
  tag_template: "v10.0.0"

before:
  hooks:
    - go mod tidy

builds:
  - id: apm
    binary: apm
    main: ./main.go
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_v10.0.0_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: apm
    package_name: apm
    formats:
      - deb
    vendor: "APM"
    maintainer: "Aarav Maloo <aaravmaloo06@gmail.com>"
    homepage: "https://aaravmaloo.github.io/apm/"
    description: "Advanced Package Manager."
    license: MIT

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'