version: 2
project_name: apm

# Hybrid Go+Rust releases are produced by the native GitHub Actions matrix in
# .github/workflows/release.yml. Keeping GoReleaser on direct build duty here
# would silently regress to an invalid pure-Go release path.
release:
  tag_template: "{{ .Tag }}"

before:
  hooks:
    - go mod tidy

builds:
  - id: apm
    binary: pm
    main: ./main.go
    skip: true
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    tags:
      - faceid
      - nativeget
    env:
      - CGO_ENABLED=1

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: apm
    package_name: apm
    formats:
      - deb
    vendor: "APM"
    maintainer: "Aarav Maloo <aaravmaloo06@gmail.com>"
    homepage: "https://aaravmaloo.github.io/apm/"
    description: "Advanced Password Manager."
    license: MIT

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
